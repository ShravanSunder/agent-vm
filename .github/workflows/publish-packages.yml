name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Release mode
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - publish

jobs:
  publish:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Install age
        run: sudo apt-get update && sudo apt-get install -y age

      - name: Build
        run: pnpm build

      - name: Check
        run: pnpm check

      - name: Unit tests
        run: pnpm test

      - name: Validate Changesets
        run: pnpm changeset status

      - name: Dry-run package publish
        if: github.event.inputs.mode == 'dry-run'
        run: |
          mkdir -p "$GITHUB_WORKSPACE/.pack-output"
          for package_dir in \
            packages/gondolin-core \
            packages/gateway-interface \
            packages/openclaw-gateway \
            packages/worker-gateway \
            packages/openclaw-agent-vm-plugin \
            packages/agent-vm
          do
            pnpm --dir "$package_dir" pack --pack-destination "$GITHUB_WORKSPACE/.pack-output"
          done
          ls -lh "$GITHUB_WORKSPACE/.pack-output"

      - name: Publish packages
        if: github.event.inputs.mode == 'publish'
        run: pnpm publish:packages
