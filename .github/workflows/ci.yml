name: CI

on:
  push:
    branches: [master, live-validation-*]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Check (lint + format + typecheck)
        run: pnpm check

      - name: Unit tests
        run: pnpm test
